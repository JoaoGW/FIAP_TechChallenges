services:
  postgres:
    image: postgres:16
    container_name: oficina-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oficina-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy || npx prisma db push; node dist/src/main.js"

volumes:
  postgres_data:
