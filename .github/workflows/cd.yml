name: CD

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build e push Docker
    runs-on: ubuntu-latest

    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}
      sha_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy no Kubernetes
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar kubectl
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" | tr -d '[:space:]' | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Materializar secret Kubernetes
        run: |
          printf '%s' "${{ secrets.K8S_SECRET_YAML_BASE64 }}" | tr -d '[:space:]' | base64 -d > k8s/secret.yaml
          chmod 600 k8s/secret.yaml

      - name: Verificar conexao com o cluster
        run: kubectl get nodes

      - name: Aplicar namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Aplicar ConfigMap
        run: kubectl apply -f k8s/configmap.yaml

      - name: Aplicar Secrets
        run: kubectl apply -f k8s/secret.yaml

      - name: Aplicar PVC do Postgres
        run: kubectl apply -f k8s/pvc-postgres.yaml

      - name: Aplicar Deployment do Postgres
        run: kubectl apply -f k8s/deployment-postgres.yaml

      - name: Aplicar Service do Postgres
        run: kubectl apply -f k8s/service-postgres.yaml

      - name: Aguardar Postgres estar pronto
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=postgres \
            -n oficina \
            --timeout=90s

      - name: Aplicar Deployment da API
        run: kubectl apply -f k8s/deployment-api.yaml

      - name: Atualizar imagem no Deployment da API
        run: |
          kubectl set image deployment/oficina-api \
            api=${{ secrets.DOCKER_IMAGE_NAME }}:${{ needs.docker.outputs.sha_tag }} \
            -n oficina

      - name: Aplicar Service da API
        run: kubectl apply -f k8s/service-api.yaml

      - name: Aplicar HPA
        run: kubectl apply -f k8s/hpa.yaml

      - name: Aguardar rollout da API
        run: |
          kubectl rollout status deployment/oficina-api \
            -n oficina \
            --timeout=120s

      - name: Rodar migrations do banco
        run: |
          kubectl exec deployment/oficina-api \
            -n oficina \
            -- npx prisma migrate deploy

      - name: Verificacao final
        run: |
          echo "=== Pods ==="
          kubectl get pods -n oficina

          echo "=== Services ==="
          kubectl get services -n oficina

          echo "=== HPA ==="
          kubectl get hpa -n oficina

          echo "=== Deployment ==="
          kubectl get deployment oficina-api -n oficina
